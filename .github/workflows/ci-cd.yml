name: GenAI platform CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint Check
        run: |
          echo "Running lint checks"

      - name: Run Unit Tests
        run: |
          echo "Running tests"
      
      - name: Build Docker Image
        run: |
          docker build -t genai-platform:${{ github.sha }} .
      
      - name: Verify Docker Images
        run: |
          docker images
      
      - name: Run Container Validation
        run: |
          docker run -d -p 8000:8000 --name genai-container -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} genai-platform:${{ github.sha }}
      
      - name: Health Check
        run: |
          sleep 15
          curl -f http://localhost:8000/health